services:
  # Backend Service
  - type: web
    name: empenhos-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm run db:migrate && npm run db:seed && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: empenhos-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: PORTAL_TRANSPARENCIA_API_KEY
        sync: false  # Configurar manualmente no dashboard
      - key: CORS_ORIGIN
        value: "*" # Permitir qualquer origem para evitar erros de CORS inicialmente

  # Frontend Service (Static Site served via Node)
  - type: web
    name: empenhos-frontend
    env: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npx -y serve -s dist
    envVars:
      # REGRA DOS 3 AMBIENTES (render.com):
      # Obrigatório definir VITE_API_URL no Render (ex: https://empenhos-backend.onrender.com/api).
      - key: VITE_API_URL
        sync: false # Configurar manualmente com a URL pública do backend (https://...)
      - key: VITE_FIREBASE_API_KEY
        sync: false
      - key: VITE_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: VITE_FIREBASE_PROJECT_ID
        sync: false
      - key: VITE_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: VITE_FIREBASE_APP_ID
        sync: false

databases:
  # PostgreSQL Database
  - name: empenhos-db
    databaseName: gestao_empenhos_vcjb
    user: gestao_user
    plan: free
    ipAllowList: []